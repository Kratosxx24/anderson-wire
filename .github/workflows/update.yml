name: Update Newswire

on:
  schedule:
    # NOTE: do NOT use "0 * * * *". The top of the hour is the single most
    # congested slot on GitHub's free runners — those jobs get delayed 10-40 min
    # and are sometimes silently dropped. Off-the-hour minutes run far more
    # reliably. GitHub also drops/delays scheduled runs on free runners, so the
    # *effective* cadence is always coarser than the cron — listing more slots
    # gives more attempts, which is the real lever on how often it actually runs.
    - cron: "7,37 * * * *"      # every ~30 min (:07 and :37). For ~15 min use
                                # "7,22,37,52 * * * *"; for hourly use "37 * * * *".
  workflow_dispatch:

permissions:
  contents: write

# Stop a slow scheduled run and a manual run from clobbering each other.
concurrency:
  group: newswire-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"                      # caches deps across runs (~30s saved)

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate the digest
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: python main.py

      - name: Commit updated digest
        run: |
          git config user.name "newswire-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/output.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update digest $(date -u +'%Y-%m-%d %H:%M UTC')"
            # Pull first in case a manual run committed while this one was working.
            git pull --rebase origin main || true
            git push
          fi

      - name: Heartbeat
        if: always()
        run: echo "Newswire run finished at $(date -u +'%Y-%m-%d %H:%M:%S UTC') — status ${{ job.status }}"
