name: Update Newswire

on:
  schedule:
    - cron: "0 * * * *"        # change to "*/30 * * * *" for every 30 min
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"                      # <-- caches deps across runs (~30s saved)

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate the digest
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: python main.py

      - name: Commit updated digest
        run: |
          git config user.name "newswire-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/output.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update digest $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
