name: Update Newswire

on:
  schedule:
    # Runs at the top of every hour (UTC). GitHub may delay scheduled runs
    # slightly under load — that's normal. Change to "*/30 * * * *" for ~30 min.
    - cron: "0 * * * *"
  workflow_dispatch:        # lets you trigger a run manually from the Actions tab

# Allow the workflow to commit the regenerated output.json back to the repo.
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate the digest
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: python main.py

      - name: Commit updated digest
        run: |
          git config user.name "newswire-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/output.json
          # Only commit if something actually changed.
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update digest $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
