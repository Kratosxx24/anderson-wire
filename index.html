<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Anderson Wire</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink:        #13161b;   /* base, near-black cool ink */
    --ink-2:      #191d24;   /* raised panel */
    --ink-3:      #20252e;   /* hover / border */
    --paper:      #ece9e0;   /* warm off-white text */
    --muted:      #878d99;   /* secondary text */
    --faint:      #565c66;   /* tertiary / rules */
    --signal:     #e0a04d;   /* warm amber accent */
    --signal-dim: #8a6a39;
    --channel:    #79b0b3;   /* desaturated cyan for channels */
    --maxw: 760px;
  }

  * { box-sizing: border-box; }

  html { -webkit-text-size-adjust: 100%; }

  body {
    margin: 0;
    background:
      radial-gradient(1200px 600px at 50% -10%, #1a1f28 0%, var(--ink) 55%) fixed;
    color: var(--paper);
    font-family: "Newsreader", Georgia, serif;
    font-size: 18px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: var(--maxw);
    margin: 0 auto;
    padding: 0 22px 96px;
  }

  /* ---------- Masthead / transmission header ---------- */
  header.mast {
    padding: 40px 0 22px;
    border-bottom: 1px solid var(--ink-3);
    margin-bottom: 8px;
  }

  .transmit {
    display: flex;
    align-items: center;
    gap: 9px;
    font-family: "Space Mono", monospace;
    font-size: 11.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--signal);
    box-shadow: 0 0 0 0 rgba(224,160,77,0.6);
    animation: pulse 2.6s infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(224,160,77,0.55); }
    70%  { box-shadow: 0 0 0 7px rgba(224,160,77,0); }
    100% { box-shadow: 0 0 0 0 rgba(224,160,77,0); }
  }

  h1.title {
    font-family: "Bricolage Grotesque", sans-serif;
    font-weight: 800;
    font-size: clamp(38px, 8vw, 62px);
    line-height: 0.96;
    letter-spacing: -0.02em;
    margin: 16px 0 14px;
  }
  h1.title .the { color: var(--muted); font-weight: 500; }
  h1.title .glow { color: var(--signal); }

  .subline {
    font-family: "Space Mono", monospace;
    font-size: 12px;
    letter-spacing: 0.04em;
    color: var(--faint);
  }
  .subline b { color: var(--muted); font-weight: 400; }

  /* ---------- Channel filter ---------- */
  .channels {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    margin: 20px 0 4px;
  }
  .chan {
    font-family: "Space Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    background: transparent;
    border: 1px solid var(--ink-3);
    border-radius: 100px;
    padding: 5px 12px;
    cursor: pointer;
    transition: border-color .15s, color .15s, background .15s;
  }
  .chan:hover { border-color: var(--faint); color: var(--paper); }
  .chan[aria-pressed="true"] {
    color: var(--ink);
    background: var(--signal);
    border-color: var(--signal);
  }
  .chan:focus-visible { outline: 2px solid var(--channel); outline-offset: 2px; }

  /* ---------- Story feed ---------- */
  .feed { margin-top: 14px; }

  article.story {
    padding: 26px 0;
    border-bottom: 1px solid var(--ink-3);
  }
  article.story:first-child { padding-top: 22px; }

  .story-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 11px;
  }

  .chan-tag {
    font-family: "Space Mono", monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--channel);
  }

  /* signal-strength meter for relevance */
  .signal-meter { display: flex; align-items: flex-end; gap: 2px; height: 13px; }
  .signal-meter i {
    width: 3px;
    background: var(--faint);
    border-radius: 1px;
    display: block;
  }
  .signal-meter i.on { background: var(--signal); }
  .signal-meter i:nth-child(1){ height: 4px; }
  .signal-meter i:nth-child(2){ height: 6px; }
  .signal-meter i:nth-child(3){ height: 8px; }
  .signal-meter i:nth-child(4){ height: 10px; }
  .signal-meter i:nth-child(5){ height: 13px; }

  h2.head {
    font-family: "Bricolage Grotesque", sans-serif;
    font-weight: 700;
    font-size: 25px;
    line-height: 1.16;
    letter-spacing: -0.015em;
    margin: 0 0 8px;
  }
  h2.head a {
    color: var(--paper);
    text-decoration: none;
    background-image: linear-gradient(var(--signal), var(--signal));
    background-size: 0% 1.5px;
    background-position: 0 100%;
    background-repeat: no-repeat;
    transition: background-size .2s ease;
  }
  h2.head a:hover { background-size: 100% 1.5px; }
  h2.head a:focus-visible { outline: 2px solid var(--signal); outline-offset: 3px; }

  p.summary {
    margin: 0 0 12px;
    color: #d4d1c8;
    font-size: 18px;
  }

  .story-foot {
    font-family: "Space Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.03em;
    color: var(--faint);
    display: flex;
    gap: 14px;
    align-items: center;
  }
  .story-foot .src { color: var(--muted); }
  .story-foot a.read {
    color: var(--signal);
    text-decoration: none;
    margin-left: auto;
  }
  .story-foot a.read:hover { text-decoration: underline; }

  /* ---------- Empty / loading states ---------- */
  .state {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
    font-family: "Space Mono", monospace;
    font-size: 13px;
    letter-spacing: 0.04em;
    line-height: 1.9;
  }
  .state .big {
    font-family: "Bricolage Grotesque", sans-serif;
    font-size: 22px;
    color: var(--paper);
    letter-spacing: -0.01em;
    margin-bottom: 10px;
    display: block;
  }

  footer.sig {
    margin-top: 40px;
    padding-top: 18px;
    border-top: 1px solid var(--ink-3);
    font-family: "Space Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--faint);
    text-transform: uppercase;
  }

  @media (max-width: 480px) {
    body { font-size: 17px; }
    h2.head { font-size: 22px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .dot { animation: none; }
    * { transition: none !important; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header class="mast">
      <div class="transmit"><span class="dot" aria-hidden="true"></span><span id="status">Establishing signal…</span></div>
      <h1 class="title"><span class="the">The</span> Anderson <span class="glow">Wire</span></h1>
      <div class="subline" id="meta">A private dispatch · filtered from the noise</div>
      <nav class="channels" id="channels" aria-label="Filter by channel"></nav>
    </header>

    <main class="feed" id="feed">
      <div class="state"><span class="big">Tuning in…</span>Pulling the latest transmission.</div>
    </main>

    <footer class="sig">Curated by an AI editor · refreshed on a schedule · only what you'd care about</footer>
  </div>

<script>
  const CATEGORY_ORDER = ["NBA","Sports","Marketing","Tech/AI","Faith","Film","World","Other"];
  let allStories = [];
  let activeChannel = "All";

  function timeAgo(iso) {
    if (!iso) return "";
    const then = new Date(iso).getTime();
    if (isNaN(then)) return "";
    const mins = Math.floor((Date.now() - then) / 60000);
    if (mins < 1) return "just now";
    if (mins < 60) return mins + "m ago";
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + "h ago";
    return Math.floor(hrs / 24) + "d ago";
  }

  function signalMeter(relevance) {
    const filled = Math.max(1, Math.round((Number(relevance) || 5) / 2)); // 1-10 -> 1-5
    let bars = "";
    for (let i = 1; i <= 5; i++) bars += `<i class="${i <= filled ? "on" : ""}"></i>`;
    return `<span class="signal-meter" title="Relevance ${relevance}/10" aria-label="Relevance ${relevance} of 10">${bars}</span>`;
  }

  function esc(s) {
    return String(s || "").replace(/[&<>"]/g, c =>
      ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;" }[c]));
  }

  function render() {
    const feed = document.getElementById("feed");
    const list = activeChannel === "All"
      ? allStories
      : allStories.filter(s => (s.category || "Other") === activeChannel);

    if (!list.length) {
      feed.innerHTML = `<div class="state"><span class="big">Quiet on this channel</span>Nothing in ${esc(activeChannel)} right now. Try another.</div>`;
      return;
    }

    feed.innerHTML = list.map(s => {
      const url = esc(s.url);
      const ago = timeAgo(s.published);
      const foot = [
        `<span class="src">${esc(s.source)}</span>`,
        ago ? `<span>${ago}</span>` : "",
        url ? `<a class="read" href="${url}" target="_blank" rel="noopener">Read →</a>` : ""
      ].filter(Boolean).join("");

      return `<article class="story">
        <div class="story-top">
          <span class="chan-tag">${esc(s.category || "Other")}</span>
          ${signalMeter(s.relevance)}
        </div>
        <h2 class="head">${url ? `<a href="${url}" target="_blank" rel="noopener">${esc(s.headline)}</a>` : esc(s.headline)}</h2>
        <p class="summary">${esc(s.summary)}</p>
        <div class="story-foot">${foot}</div>
      </article>`;
    }).join("");
  }

  function buildChannels() {
    const present = new Set(allStories.map(s => s.category || "Other"));
    const ordered = ["All", ...CATEGORY_ORDER.filter(c => present.has(c))];
    const nav = document.getElementById("channels");
    nav.innerHTML = ordered.map(c =>
      `<button class="chan" role="button" aria-pressed="${c === activeChannel}" data-ch="${esc(c)}">${esc(c)}</button>`
    ).join("");
    nav.querySelectorAll(".chan").forEach(btn => {
      btn.addEventListener("click", () => {
        activeChannel = btn.dataset.ch;
        nav.querySelectorAll(".chan").forEach(b =>
          b.setAttribute("aria-pressed", b.dataset.ch === activeChannel));
        render();
      });
    });
  }

  async function load() {
    try {
      const res = await fetch("output.json?t=" + Date.now());
      if (!res.ok) throw new Error("no feed yet");
      const data = await res.json();
      allStories = data.stories || [];

      document.getElementById("status").textContent =
        "Last transmission · " + timeAgo(data.generated_at);
      document.getElementById("meta").innerHTML =
        `<b>${allStories.length}</b> stories · filtered from the noise`;

      if (!allStories.length) {
        document.getElementById("feed").innerHTML =
          `<div class="state"><span class="big">Signal's clear</span>Nothing met the bar this cycle. That's the filter working.</div>`;
        return;
      }
      buildChannels();
      render();
    } catch (e) {
      document.getElementById("status").textContent = "No signal yet";
      document.getElementById("feed").innerHTML =
        `<div class="state"><span class="big">Awaiting first transmission</span>Once the scheduler runs, your dispatch lands here.<br>Trigger it manually from the repo's Actions tab to see it now.</div>`;
    }
  }

  load();
  // Re-check for a fresh dispatch every 5 minutes while the tab is open.
  setInterval(load, 5 * 60 * 1000);
</script>
</body>
</html>
